<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統登入 - 銓瑞複材科技</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --surface: #ffffff;
            --background: #eef2f7;
            --border: #dbe3ee;
            --text: #172033;
            --muted: #64748b;
            --danger: #b42318;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px;
            font-family: Inter, "Noto Sans TC", sans-serif; color: var(--text);
            background:
                radial-gradient(circle at 15% 15%, rgba(57,73,171,.16), transparent 30%),
                radial-gradient(circle at 85% 85%, rgba(245,124,0,.12), transparent 28%),
                var(--background);
        }
        .login-card {
            width: min(430px, 100%); padding: 38px; border: 1px solid rgba(219,227,238,.9);
            border-radius: 22px; background: rgba(255,255,255,.97);
            box-shadow: 0 24px 60px rgba(15,23,42,.14);
        }
        .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
        .brand-mark {
            width: 48px; height: 48px; display: grid; place-items: center; border-radius: 14px;
            background: linear-gradient(145deg, var(--primary-light), var(--primary));
            color: #fff; font-size: 21px; font-weight: 800; box-shadow: 0 8px 20px rgba(26,35,126,.22);
        }
        .brand strong { display: block; color: var(--primary); font-size: 17px; }
        .brand span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
        h1 { margin: 0 0 8px; font-size: 27px; }
        .intro { margin: 0 0 26px; color: var(--muted); font-size: 14px; line-height: 1.7; }
        label { display: block; margin: 0 0 8px; font-size: 13px; font-weight: 700; }
        .field { margin-bottom: 18px; }
        input {
            width: 100%; height: 48px; padding: 0 14px; border: 1px solid var(--border);
            border-radius: 11px; outline: none; background: #fff; color: var(--text); font: inherit;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 4px rgba(57,73,171,.1); }
        .submit {
            width: 100%; height: 49px; margin-top: 4px; border: 0; border-radius: 11px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: #fff; cursor: pointer; font: 700 15px Inter, "Noto Sans TC", sans-serif;
            box-shadow: 0 9px 20px rgba(26,35,126,.2);
        }
        .submit:disabled { opacity: .65; cursor: wait; }
        .actions { display: flex; justify-content: flex-end; margin-top: 16px; }
        .link-button { border: 0; background: none; color: var(--primary-light); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
        #message { min-height: 22px; margin: 16px 0 0; color: var(--danger); font-size: 13px; line-height: 1.6; text-align: center; }
        #message.success { color: #18794e; }
        .footer { margin-top: 24px; color: #94a3b8; font-size: 11px; text-align: center; }
        @media (max-width: 520px) { .login-card { padding: 28px 22px; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-auth.js"></script>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <div class="brand-mark">W</div>
            <div><strong>銓瑞複材科技</strong><span>Windner Internal System</span></div>
        </div>
        <h1>歡迎登入</h1>
        <p class="intro">請使用公司核發的帳號登入雲端整合管理系統。</p>

        <form id="loginForm">
            <div class="field">
                <label for="email">電子郵件</label>
                <input id="email" name="email" type="email" autocomplete="username" required placeholder="name@company.com">
            </div>
            <div class="field">
                <label for="password">密碼</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required minlength="6" placeholder="請輸入密碼">
            </div>
            <button id="submitButton" class="submit" type="submit">登入系統</button>
            <div class="actions"><button id="resetPassword" class="link-button" type="button">忘記密碼？</button></div>
            <p id="message" role="alert" aria-live="polite"></p>
        </form>
        <div class="footer">本系統僅供授權人員使用</div>
    </main>

    <script>
        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitButton = document.getElementById("submitButton");
        const resetPasswordButton = document.getElementById("resetPassword");
        const message = document.getElementById("message");

        firebase.auth().onAuthStateChanged((user) => {
            if (user) redirectAfterLogin();
        });

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage("");
            setLoading(true);

            try {
                await firebase.auth().signInWithEmailAndPassword(
                    emailInput.value.trim(),
                    passwordInput.value
                );
            } catch (error) {
                setMessage(getLoginErrorMessage(error));
                setLoading(false);
            }
        });

        resetPasswordButton.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            if (!email) {
                setMessage("請先輸入電子郵件，再申請重設密碼。");
                emailInput.focus();
                return;
            }

            resetPasswordButton.disabled = true;
            try {
                await firebase.auth().sendPasswordResetEmail(email);
                setMessage("密碼重設信已寄出，請檢查信箱。", true);
            } catch (error) {
                setMessage(getLoginErrorMessage(error));
            } finally {
                resetPasswordButton.disabled = false;
            }
        });

        function redirectAfterLogin() {
            const returnTo = sessionStorage.getItem("authReturnTo") || "index.html";
            sessionStorage.removeItem("authReturnTo");
            const safeTarget = /^(?![a-z]+:|\/\/)[^\\]*$/i.test(returnTo) ? returnTo : "index.html";
            window.location.replace(safeTarget);
        }

        function setLoading(loading) {
            submitButton.disabled = loading;
            submitButton.textContent = loading ? "登入中…" : "登入系統";
        }

        function setMessage(text, success = false) {
            message.textContent = text;
            message.className = success ? "success" : "";
        }

        function getLoginErrorMessage(error) {
            const messages = {
                "auth/invalid-email": "電子郵件格式不正確。",
                "auth/invalid-credential": "帳號或密碼不正確。",
                "auth/user-not-found": "帳號或密碼不正確。",
                "auth/wrong-password": "帳號或密碼不正確。",
                "auth/user-disabled": "此帳號已停用，請聯絡管理者。",
                "auth/too-many-requests": "嘗試次數過多，請稍後再試。",
                "auth/network-request-failed": "網路連線失敗，請確認網路後重試。",
                "auth/operation-not-allowed": "Firebase 尚未啟用 Email/Password 登入。",
                "auth/unauthorized-domain": "目前網站網域尚未加入 Firebase 授權網域。"
            };
            console.error("Firebase 登入操作失敗:", error);
            return messages[error && error.code] || "登入失敗，請稍後再試。";
        }
    </script>
</body>
</html>
